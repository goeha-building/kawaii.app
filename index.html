<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI가 알려주는 뇌건강 순발력 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #020617; overflow: hidden; }
        video, canvas { transform: rotateY(180deg); object-fit: cover; }
        .timer-font { font-family: monospace; }
        .flash-active { animation: flash-anim 0.2s ease-out; }
        @keyframes flash-anim { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        .hamster-laugh { animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: rotate(10deg); } 50% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        .sticker { position: absolute; font-size: 3.5rem; pointer-events: none; z-index: 45; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
    </style>
</head>
<body class="text-slate-200 w-screen h-screen">

    <div id="start-screen" class="absolute inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
        <div class="max-w-2xl">
            <h1 class="text-5xl font-black mb-4 tracking-tighter text-white">🧠 나의 뇌 나이는 몇 살?</h1>
            <h2 class="text-xl text-sky-400 font-bold mb-8 italic">실시간 뉴런 활성화 테스트</h2>
            <div class="bg-slate-900 border border-slate-800 p-6 rounded-3xl text-left space-y-4 mb-8 shadow-2xl">
                <p class="text-slate-300">디지털 중독으로 <span class="text-rose-500 font-bold">'틀딱'</span>이 되어가고 계십니까?</p>
                <p class="text-slate-300">1분도 소요되지 않는 간단한 테스트로 <span class="text-rose-500 font-bold">뇌손상</span>을 예방하십시오.</p>
                <p class="text-slate-300"><span class="text-rose-500 font-bold">효과 : </span>테스토스테론 폭발 및 알파메일/피메일 등극.</p>
                <p class="text-xs text-slate-500 text-center border-t border-slate-800 pt-4">* PC 환경 권장 (거울 모드로 작동합니다)</p>
            </div>
            <button id="start-btn" class="px-20 py-6 bg-sky-600 rounded-full text-2xl font-black hover:bg-sky-500 transition-all shadow-xl">테스트 시작</button>
        </div>
    </div>

    <div id="app-container" class="hidden relative w-full h-full bg-black">
        <video id="webcam" class="absolute inset-0 w-full h-full" autoplay playsinline></video>
        <canvas id="output_canvas" class="absolute inset-0 w-full h-full z-10 pointer-events-none opacity-40"></canvas>
        <div id="sticker-layer" class="absolute inset-0 z-40 pointer-events-none"></div>
        <div class="absolute top-10 left-0 right-0 z-20 flex flex-col items-center pointer-events-none px-4">
            <div id="stage-info" class="text-sky-400 font-black text-2xl mb-2 tracking-[0.3em] uppercase opacity-80">Stage 0</div>
            <div id="instruction-box" class="bg-black/70 backdrop-blur-2xl border border-white/20 px-12 py-6 rounded-[3rem] text-4xl font-black text-center max-w-full shadow-2xl">L O A D I N G . . .</div>
            <div id="timer" class="mt-6 text-5xl font-black timer-font text-white/50">00.00s</div>
        </div>
        <div id="flash" class="absolute inset-0 bg-white opacity-0 z-[100] pointer-events-none"></div>
    </div>

    <div id="result-modal" class="hidden fixed inset-0 z-[200] bg-slate-950/98 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border
