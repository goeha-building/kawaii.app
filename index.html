<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawaii Vision AI - Sticker Photo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        video, canvas { transform: rotateY(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ec4899; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="flex flex-col md:flex-row gap-6 max-w-6xl w-full h-[85vh]">
        
        <div id="app-container" class="relative flex-[3] bg-black rounded-3xl overflow-hidden border-4 border-pink-500/30 shadow-2xl">
            <video id="webcam" class="w-full h-full object-cover" autoplay playsinline></video>
            <canvas id="output_canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
            
            <div id="status-overlay" class="absolute top-5 right-5 flex flex-col items-end gap-2">
                <div id="pose-label" class="opacity-0 transition-all duration-300 text-3xl font-black text-white bg-pink-500/80 px-6 py-2 rounded-2xl backdrop-blur-md shadow-lg">
                    준비 중...
                </div>
            </div>

            <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-20">
                <h1 class="text-4xl font-black mb-6 text-pink-500">Kawaii Vision AI</h1>
                <button id="start-btn" class="px-10 py-4 bg-pink-500 rounded-full text-xl font-bold hover:scale-105 transition-transform shadow-xl">
                    카메라 시작하기
                </button>
            </div>

            <div id="flash" class="absolute inset-0 bg-white opacity-0 pointer-events-none z-30 transition-opacity duration-100"></div>
        </div>

        <div class="flex-1 bg-slate-800/50 rounded-3xl p-4 flex flex-col border border-white/10 shadow-xl overflow-hidden">
            <h3 class="text-center font-bold text-pink-400 mb-4 border-b border-white/10 pb-2">📸 스티커 갤러리</h3>
            <div id="gallery-list" class="flex flex-col gap-4 overflow-y-auto custom-scrollbar pr-2">
                </div>
        </div>
    </div>

    <div id="photo-modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-3 rounded-2xl max-w-2xl w-full">
            <img id="captured-image" class="w-full rounded-xl border border-slate-200">
            <div class="flex justify-between mt-4 px-2">
                <button id="close-modal" class="text-slate-500 font-bold px-4 py-2">닫기</button>
                <a id="download-link" class="bg-pink-500 text-white px-8 py-2 rounded-xl font-bold">저장하기</a>
            </div>
        </div>
    </div>

    <script type="module">
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const poseLabel = document.getElementById('pose-label');
        const galleryList = document.getElementById('gallery-list');
        const photoModal = document.getElementById('photo-modal');
        const capturedImage = document.getElementById('captured-image');
        const closeModal = document.getElementById('close-modal');
        const downloadLink = document.getElementById('download-link');

        let lastShotTime = 0;

        // 1. MediaPipe 설정
        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6, minTrackingConfidence: 0.6 });

        // 2. 사진 촬영 로직
        function takePhotoAuto(poseName) {
            const now = Date.now();
            if (now - lastShotTime < 2000) return; // 2초 쿨타임
            lastShotTime = now;

            // 플래시 효과
            const flash = document.getElementById('flash');
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 100);

            // 캡쳐
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = videoElement.videoWidth;
            tempCanvas.height = videoElement.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.translate(tempCanvas.width, 0);
            tempCtx.scale(-1, 1);
            tempCtx.drawImage(videoElement, 0, 0);
            const dataUrl = tempCanvas.toDataURL('image/png');

            // 갤러리에 추가
            const item = document.createElement('div');
            item.className = "relative cursor-pointer hover:scale-105 transition-all rounded-xl overflow-hidden shadow-lg border-2 border-pink-500/20";
            item.innerHTML = `<img src="${dataUrl}" class="w-full"><div class="absolute bottom-0 bg-pink-500/80 w-full text-[10px] text-center py-1">${poseName}</div>`;
            item.onclick = () => {
                capturedImage.src = dataUrl;
                downloadLink.href = dataUrl;
                downloadLink.download = `kawaii_${poseName}.png`;
                photoModal.classList.remove('hidden');
            };
            galleryList.prepend(item);
        }

        // 3. 자세 감지 통합 로직
        function onResults(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            let detectedPose = "";

            if (results.multiHandLandmarks) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const label = results.multiHandedness[i].label; // Left or Right
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#ec4899', lineWidth: 4});
                    
                    const isIndexUp = landmarks[8].y < landmarks[6].y;
                    const isMiddleUp = landmarks[12].y < landmarks[10].y;
                    const isRingDown = landmarks[16].y > landmarks[14].y;
                    const isPinkyDown = landmarks[20].y > landmarks[18].y;

                    // 뻐큐 판별 (중지만 펴짐)
                    if (isMiddleUp && !isIndexUp && isRingDown && isPinkyDown) {
                        detectedPose = "뻐큐 🖕";
                    } 
                    // 브이 판별
                    else if (isIndexUp && isMiddleUp && isRingDown && isPinkyDown) {
                        detectedPose = (label === "Left" ? "오른손 브이 ✌️" : "왼손 브이 ✌️"); // 거울모드 반대
                    }
                }
            }
            
            if (detectedPose) {
                poseLabel.innerText = detectedPose;
                poseLabel.style.opacity = "1";
                takePhotoAuto(detectedPose);
            } else {
                poseLabel.style.opacity = "0";
            }
            canvasCtx.restore();
        }

        function onFaceResults(results) {
            if (results.multiFaceLandmarks) {
                for (const landmarks of results.multiFaceLandmarks) {
                    // 윙크 감지
                    const leftEye = Math.abs(landmarks[159].y - landmarks[145].y);
                    const rightEye = Math.abs(landmarks[386].y - landmarks[374].y);
                    
                    if (leftEye < 0.012 && rightEye > 0.025) updateFacePose("오른쪽 윙크 😉");
                    else if (rightEye < 0.012 && leftEye > 0.025) updateFacePose("왼쪽 윙크 😉");

                    // 고개 기울임
                    const tilt = landmarks[1].x - landmarks[152].x;
                    if (tilt > 0.05) updateFacePose("오른쪽 갸우뚱? ↘️");
                    else if (tilt < -0.05) updateFacePose("왼쪽 갸우뚱? ↙️");

                    // 혀 내밀기 (입술 거리)
                    const mouthDist = Math.abs(landmarks[13].y - landmarks[14].y);
                    if (mouthDist > 0.04) updateFacePose("메롱~ 😛");
                }
            }
        }

        function updateFacePose(name) {
            poseLabel.innerText = name;
            poseLabel.style.opacity = "1";
            takePhotoAuto(name);
        }

        hands.onResults(onResults);
        faceMesh.onResults(onFaceResults);

        startBtn.onclick = async () => {
            startScreen.classList.add('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            videoElement.srcObject = stream;
            
            async function loop() {
                await hands.send({image: videoElement});
                await faceMesh.send({image: videoElement});
                requestAnimationFrame(loop);
            }
            loop();
        };

        closeModal.onclick = () => photoModal.classList.add('hidden');
    </script>
</body>
</html>
